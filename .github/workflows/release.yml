name: Release

# Trigger: push a tag like v1.0.0
on:
  push:
    tags: ["v*"]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  APP_NAME: "Watermark"

jobs:
  # ─── macOS Build (Universal: Apple Silicon + Intel) ─────
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Determine tag
        id: tag
        env:
          TAG_INPUT: ${{ github.event.inputs.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${TAG_INPUT}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Wails app (universal binary)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          wails build -clean -platform darwin/universal \
            -ldflags "-X main.version=${TAG}"

      - name: Ad-hoc sign (no Developer ID)
        run: codesign --force --deep --sign - "./build/bin/${{ env.APP_NAME }}.app"

      # ── Optional: Real code signing ──
      # Uncomment when you have an Apple Developer certificate
      # - name: Import code signing certificate
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
      #     KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      #     rm certificate.p12
      #
      # - name: Code sign with Developer ID
      #   run: |
      #     codesign --deep --force --verbose \
      #       --options runtime \
      #       --entitlements ./build/darwin/entitlements.plist \
      #       --sign "Developer ID Application: Kezlo98 (${{ secrets.APPLE_TEAM_ID }})" \
      #       "./build/bin/${{ env.APP_NAME }}.app"
      #
      # - name: Notarize
      #   env:
      #     AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
      #   run: |
      #     ditto -c -k --keepParent "./build/bin/${{ env.APP_NAME }}.app" app.zip
      #     xcrun notarytool submit app.zip \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #       --password "$AC_PASSWORD" \
      #       --wait
      #     xcrun stapler staple "./build/bin/${{ env.APP_NAME }}.app"
      #     rm app.zip

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --volicon "./build/darwin/iconfile.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "${{ env.APP_NAME }}.app" 180 170 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 480 170 \
            "./build/bin/${{ env.APP_NAME }}-darwin-universal.dmg" \
            "./build/bin/${{ env.APP_NAME }}.app"

      - name: Create ZIP for auto-updater
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cd ./build/bin
          zip -r "${APP_NAME}_${TAG}_darwin_all.zip" "${{ env.APP_NAME }}.app"
        env:
          APP_NAME: ${{ env.APP_NAME }}

      - name: Generate SHA256 checksums
        run: |
          cd ./build/bin
          shasum -a 256 *.zip *.dmg > checksums.txt
          cat checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-darwin-universal
          path: |
            ./build/bin/${{ env.APP_NAME }}-darwin-universal.dmg
            ./build/bin/${{ env.APP_NAME }}_*.zip
            ./build/bin/checksums.txt

